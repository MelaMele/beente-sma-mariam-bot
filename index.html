<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>በእንተ ስማ ለማርያም - Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="user-profile">
            <div class="avatar" id="user-avatar">🎁</div>
            <div class="user-info">
                <h3 id="user-name">ክቡር ምዕመን</h3>
                <div class="badge-row">
                    <span class="badge" id="user-badge">የበረከት ጀማሪ</span>
                    <span class="points-badge">🪙 <span id="user-points">0</span></span>
                </div>
            </div>
        </div>

        <div class="blessing-card">
            <h2 id="holiday-title">የዕለቱ መታሰቢያ</h2>
            <p id="scripture-quote">"የጻድቅ መታሰቢያ ለበረከት ነው።" (ምሳሌ 10:7)</p>
        </div>

        <div class="main-button-container">
            <button class="blessing-circle-btn" id="main-tap-btn">
                <span class="btn-text">በእንተ ስማ ለማርያም</span>
                <span class="btn-subtext">ለመባረክ ይንኩ</span>
            </button>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <span class="stat-title">የጋበዟቸው ሰዎች</span>
                <span class="stat-value" id="referral-count">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-title">የእርስዎ ደረጃ</span>
                <span class="stat-value" id="user-rank">#--</span>
            </div>
        </div>

        <div class="donation-drawer" id="donation-drawer">
            <h3>የዕለቱ የበረከት ተሳትፎ</h3>
            <p>በእለቱ የተመረጡትን ችግረኞች ወይም አብያተ ክርስቲያናት በቀጥታ ይደግፉ。</p>
            <div class="payment-methods">
                <button class="pay-btn cbe">CBE Birr</button>
                <button class="pay-btn telebirr">Telebirr</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
